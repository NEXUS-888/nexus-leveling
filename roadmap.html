<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NEXUS leveling — Roadmap</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<nav>
  <div class="nav-brand">⚡ <span>NEXUS</span>leveling</div>
  <button class="hamburger" onclick="document.querySelector('.nav-links').classList.toggle('open')" aria-label="Menu">☰</button>
  <div class="nav-links">
    <a href="index.html">Dashboard</a>
    <a href="log.html">Daily Log</a>
    <a href="roadmap.html" class="active">Roadmap</a>
    <a href="resources.html">Resources</a>
    <a href="flashcards.html">Flashcards</a>
    <a href="projects.html">Projects</a>
    <a href="jobs.html">Jobs</a>
    <a href="cheatsheet.html">Cheatsheet</a>
  </div>
  <div class="nav-right"><div class="streak-pill" id="streak-pill">🔥 0d streak</div></div>
</nav>

<div class="page">
  <div class="page-header animate-in">
    <h1>Roadmap</h1>
    <p>Click topics to mark them done. Your full 12-month roadmap.</p>
  </div>

  <div class="stats-grid animate-in delay-1" style="margin-bottom:1.5rem;" id="roadmap-stats"></div>

  <div id="roadmap-grid" class="animate-in delay-2"></div>
</div>

<script src="app.js"></script>
<script>
function getProgress() {
  return S.get(KEYS.roadmap) || {};
}

// Map roadmap labels to resource phase strings and count matches
const LABEL_TO_PHASE = {
  'Week 1': 'Week 1', 'Week 2': 'Week 2', 'Week 3': 'Week 3', 'Week 4': 'Week 4',
  'Month 2': 'Month 2', 'Months 3–4': 'Month 3-4', 'Month 5': 'Month 5',
  'Month 6': 'Month 6', 'Months 7–8': 'Month 7-8', 'Months 9–10': 'Month 9-10',
  'Months 11–12': 'General',
};
function getResourceCount(label) {
  const phase = LABEL_TO_PHASE[label] || label;
  return RESOURCES.filter(r => r.phase === phase).length;
}

function toggleTopic(phaseId, topic) {
  const done = getProgress();
  if (!done[phaseId]) done[phaseId] = [];
  const idx = done[phaseId].indexOf(topic);
  if (idx === -1) done[phaseId].push(topic);
  else done[phaseId].splice(idx, 1);
  S.set(KEYS.roadmap, done);
  render();
}

function markAllDone(phaseId) {
  const done = getProgress();
  const phase = ROADMAP.find(p => p.id === phaseId);
  if (!phase) return;
  done[phaseId] = [...phase.topics];
  S.set(KEYS.roadmap, done);
  render();
  toast('Phase marked complete!', 'success');
}

function clearPhase(phaseId) {
  const done = getProgress();
  done[phaseId] = [];
  S.set(KEYS.roadmap, done);
  render();
}

function renderStats() {
  const prog = getRoadmapProgress();
  const done = getProgress();
  const phasesComplete = ROADMAP.filter(p => (done[p.id] || []).length === p.topics.length).length;

  document.getElementById('roadmap-stats').innerHTML = `
    <div class="stat-card"><div class="stat-label">Overall progress</div><div class="stat-val" style="color:var(--accent);">${prog.pct}%</div><div class="stat-sub">${prog.completed}/${prog.total} topics</div></div>
    <div class="stat-card"><div class="stat-label">Phases complete</div><div class="stat-val" style="color:var(--green);">${phasesComplete}</div><div class="stat-sub">of ${ROADMAP.length} phases</div></div>
    <div class="stat-card"><div class="stat-label">Topics remaining</div><div class="stat-val">${prog.total - prog.completed}</div><div class="stat-sub">Keep going</div></div>
  `;
}

function render() {
  renderStats();
  const done = getProgress();
  let lastPhase = '';
  let html = '';

  ROADMAP.forEach(p => {
    const doneTops = done[p.id] || [];
    const pct = Math.round(doneTops.length / p.topics.length * 100);
    const isComplete = pct === 100;

    if (p.phase !== lastPhase) {
      if (lastPhase) html += '</div>';
      html += `<div style="margin-bottom:2rem;">
        <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);margin-bottom:12px;padding-left:2px;">${p.phase}</div>`;
      lastPhase = p.phase;
    }

    const resPhase = LABEL_TO_PHASE[p.label] || p.label;
    const resCount = getResourceCount(p.label);
    html += `
      <div class="card" style="margin-bottom:12px; ${isComplete ? 'border-color:#1a5c3a;' : ''}">
        <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:12px;">
          <div style="display:flex;align-items:center;gap:10px;">
            <span style="font-size:15px;font-weight:600;color:${isComplete ? 'var(--green)' : 'var(--text)'};">${isComplete ? '✅ ' : ''}${p.label}</span>
            <span class="badge ${isComplete ? 'badge-green' : pct > 0 ? 'badge-blue' : 'badge-gray'}">${doneTops.length}/${p.topics.length}</span>
          </div>
          <div style="display:flex;gap:6px;">
            ${resCount > 0 ? `<a href="resources.html?phase=${encodeURIComponent(resPhase)}" class="btn btn-sm" style="text-decoration:none;">📚 Resources (${resCount})</a>` : ''}
            <button class="btn btn-sm btn-green" onclick="markAllDone('${p.id}')">Mark all done</button>
            <button class="btn btn-sm" onclick="clearPhase('${p.id}')">Reset</button>
          </div>
        </div>
        <div class="progress-bar-wrap" style="margin-bottom:14px;">
          <div class="progress-bar-fill ${isComplete ? 'green' : ''}" style="width:${pct}%"></div>
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:8px;">
          ${p.topics.map(t => {
            const isDone = doneTops.includes(t);
            const safe = escHtml(t);
            const jsonSafe = escHtml(JSON.stringify(t));
            return `<div onclick="toggleTopic('${p.id}', ${jsonSafe})"
              style="font-size:12px;padding:5px 12px;border-radius:20px;border:1px solid ${isDone ? '#1a5c3a' : 'var(--border)'};
              background:${isDone ? 'var(--green-bg)' : 'var(--bg3)'};color:${isDone ? 'var(--green)' : 'var(--text2)'};
              cursor:pointer;transition:all .15s;user-select:none;">
              ${isDone ? '✓ ' : ''}${safe}
            </div>`;
          }).join('')}
        </div>
      </div>`;
  });

  html += '</div>';
  document.getElementById('roadmap-grid').innerHTML = html;
}

render();
</script>
</body>
</html>
