<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NEXUS leveling — Flashcards</title>
<link rel="stylesheet" href="style.css">
<style>
.flashcard-wrap { perspective: 1000px; margin-bottom: 1.5rem; cursor: pointer; }
.flashcard-inner {
  position: relative; width: 100%; min-height: 240px;
  transition: transform .5s; transform-style: preserve-3d;
}
.flashcard-wrap.flipped .flashcard-inner { transform: rotateY(180deg); }
.flashcard-front, .flashcard-back {
  position: absolute; width: 100%; min-height: 240px;
  background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg);
  padding: 2rem; display: flex; flex-direction: column;
  align-items: center; justify-content: center; text-align: center;
  backface-visibility: hidden; -webkit-backface-visibility: hidden;
}
.flashcard-back { transform: rotateY(180deg); background: var(--bg3); }
.card-q { font-size: 17px; font-weight: 500; line-height: 1.6; color: var(--text); }
.card-a { font-size: 13px; color: var(--text2); line-height: 1.8; white-space: pre-wrap; }
.card-topic { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1rem; }
.card-hint { font-size: 12px; color: var(--text3); margin-top: 1.5rem; }
.grade-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
.progress-dots { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; margin-bottom: 1.5rem; }
.dot { width: 10px; height: 10px; border-radius: 50%; background: var(--bg3); border: 1px solid var(--border); cursor: pointer; transition: all .15s; }
.dot.know { background: var(--green); border-color: #1a5c3a; }
.dot.almost { background: var(--amber); border-color: #4a3010; }
.dot.no { background: var(--red); border-color: #5c1f1f; }
.dot.current { transform: scale(1.4); }
</style>
</head>
<body>
<nav>
  <div class="nav-brand">⚡ <span>NEXUS</span>leveling</div>
  <button class="hamburger" onclick="document.querySelector('.nav-links').classList.toggle('open')" aria-label="Menu">☰</button>
  <div class="nav-links">
    <a href="index.html">Dashboard</a>
    <a href="log.html">Daily Log</a>
    <a href="roadmap.html">Roadmap</a>
    <a href="resources.html">Resources</a>
    <a href="flashcards.html" class="active">Flashcards</a>
    <a href="projects.html">Projects</a>
    <a href="jobs.html">Jobs</a>
    <a href="cheatsheet.html">Cheatsheet</a>
  </div>
  <div class="nav-right"><div class="streak-pill" id="streak-pill">🔥 0d streak</div></div>
</nav>

<div class="page-sm">
  <div class="page-header animate-in delay-1">
    <h1>Flashcards</h1>
    <p>20 cards covering Linux, AWS, Docker, K8s. Internship interviews tested on these.</p>
  </div>

  <div class="stats-grid animate-in delay-2" id="card-stats" style="margin-bottom:1.5rem;"></div>

  <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1.5rem;align-items:center;">
    <select id="topic-filter" onchange="filterCards()" style="font-size:13px;padding:7px 10px;">
      <option value="">All topics</option>
      <option>Linux</option><option>AWS</option><option>Docker</option><option>K8s</option>
    </select>
    <select id="mode-filter" onchange="filterCards()" style="font-size:13px;padding:7px 10px;">
      <option value="">All cards</option>
      <option value="no">Need work (red)</option>
      <option value="almost">Almost (yellow)</option>
      <option value="know">Know it (green)</option>
      <option value="unseen">Unseen</option>
    </select>
    <button class="btn btn-sm" onclick="shuffle()">🔀 Shuffle</button>
    <button class="btn btn-sm" onclick="resetScores()">Reset scores</button>
    <span style="font-size:12px;color:var(--text3);margin-left:auto;" id="card-counter"></span>
  </div>

  <div class="progress-dots" id="progress-dots"></div>

  <div class="flashcard-wrap animate-in delay-3" id="flashcard" onclick="flip()">
    <div class="flashcard-inner">
      <div class="flashcard-front">
        <div class="card-topic" id="card-topic"></div>
        <div class="card-q" id="card-q">Loading...</div>
        <div class="card-hint">Click to reveal answer</div>
      </div>
      <div class="flashcard-back">
        <div class="card-topic" id="card-topic-b"></div>
        <div class="card-a" id="card-a"></div>
      </div>
    </div>
  </div>

  <div class="grade-row" id="grade-row" style="display:none; margin-bottom:1.5rem;">
    <button class="btn btn-danger" onclick="grade('no')">✗ Don't know</button>
    <button class="btn" style="border-color:#4a3010;color:var(--amber);" onclick="grade('almost')">~ Almost</button>
    <button class="btn btn-green" onclick="grade('know')">✓ Know it</button>
  </div>

  <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;">
    <button class="btn" onclick="prev()">← Prev</button>
    <button class="btn btn-primary" onclick="next()">Next →</button>
  </div>

  <div id="done-screen" style="display:none;" class="card" style="text-align:center; margin-top:1.5rem;">
    <div style="text-align:center; padding:1rem;">
      <div style="font-size:2rem;margin-bottom:8px;">🎉</div>
      <div style="font-size:16px;font-weight:600;margin-bottom:8px;">Deck complete!</div>
      <div style="font-size:13px;color:var(--text2);margin-bottom:16px;" id="done-stats"></div>
      <button class="btn btn-primary" onclick="restart()">Restart</button>
    </div>
  </div>

  <div class="card animate-in delay-4" style="margin-top:1.5rem;">
    <div class="section-title" style="margin-top:0;">Add your own flashcard</div>
    <div class="form-group">
      <label>Topic</label>
      <input type="text" id="new-fc-topic" placeholder="e.g. Terraform, Ansible, Helm...">
    </div>
    <div class="form-group">
      <label>Question *</label>
      <textarea id="new-fc-q" placeholder="What is the interview question?"></textarea>
    </div>
    <div class="form-group">
      <label>Answer *</label>
      <textarea id="new-fc-a" placeholder="Write a detailed answer you'd give in an interview..."></textarea>
    </div>
    <button class="btn btn-primary" onclick="submitCustomCard()">+ Add flashcard</button>
  </div>

  <div id="custom-cards-list" style="margin-top:1.5rem;"></div>
</div>

<script src="app.js"></script>
<script>
let deck = [...getAllFlashcards()];
let current = 0;
let flipped = false;

function getScores() { return S.get(KEYS.cards) || {}; }
function saveScore(id, val) {
  const s = getScores(); s[id] = val; S.set(KEYS.cards, s);
}

function filterCards() {
  const topic = document.getElementById('topic-filter').value;
  const mode = document.getElementById('mode-filter').value;
  const scores = getScores();

  deck = getAllFlashcards().filter(c => {
    if (topic && c.topic !== topic) return false;
    if (mode === 'no') return scores[c.id] === 'no';
    if (mode === 'almost') return scores[c.id] === 'almost';
    if (mode === 'know') return scores[c.id] === 'know';
    if (mode === 'unseen') return !scores[c.id];
    return true;
  });

  current = 0;
  document.getElementById('done-screen').style.display = 'none';
  renderCard();
  renderDots();
  renderStats();
}

function shuffle() {
  for (let i = deck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
  current = 0; renderCard(); renderDots(); toast('Shuffled!', 'success');
}

function flip() {
  if (current >= deck.length) return;
  flipped = !flipped;
  document.getElementById('flashcard').classList.toggle('flipped', flipped);
  document.getElementById('grade-row').style.display = flipped ? 'flex' : 'none';
}

function grade(val) {
  if (current >= deck.length) return;
  saveScore(deck[current].id, val);
  renderDots();
  renderStats();
  next();
}

function next() {
  if (current >= deck.length - 1) {
    showDone(); return;
  }
  current++;
  flipped = false;
  document.getElementById('flashcard').classList.remove('flipped');
  document.getElementById('grade-row').style.display = 'none';
  renderCard();
  renderDots();
}

function prev() {
  if (current <= 0) return;
  current--;
  flipped = false;
  document.getElementById('flashcard').classList.remove('flipped');
  document.getElementById('grade-row').style.display = 'none';
  renderCard();
  renderDots();
}

function renderCard() {
  if (!deck.length) {
    document.getElementById('card-q').textContent = 'No cards match your filter.';
    document.getElementById('card-a').textContent = '';
    document.getElementById('card-topic').textContent = '';
    document.getElementById('card-counter').textContent = '';
    return;
  }
  if (current >= deck.length) return;
  const c = deck[current];
  document.getElementById('card-topic').textContent = c.topic;
  document.getElementById('card-topic-b').textContent = c.topic;
  document.getElementById('card-q').textContent = c.q;
  document.getElementById('card-a').textContent = c.a;
  document.getElementById('card-counter').textContent = `${current + 1} / ${deck.length}`;
}

function renderDots() {
  const scores = getScores();
  document.getElementById('progress-dots').innerHTML = deck.map((c, i) => {
    const s = scores[c.id] || '';
    return `<div class="dot ${s} ${i === current ? 'current' : ''}" title="${c.topic}: ${s || 'unseen'}" onclick="jumpTo(${i})"></div>`;
  }).join('');
}

function jumpTo(i) {
  current = i;
  flipped = false;
  document.getElementById('flashcard').classList.remove('flipped');
  document.getElementById('grade-row').style.display = 'none';
  document.getElementById('done-screen').style.display = 'none';
  renderCard();
  renderDots();
}

function renderStats() {
  const scores = getScores();
  const all = getAllFlashcards();
  const know = all.filter(c => scores[c.id] === 'know').length;
  const almost = all.filter(c => scores[c.id] === 'almost').length;
  const no = all.filter(c => scores[c.id] === 'no').length;
  const unseen = all.length - know - almost - no;
  const pct = Math.round(know / all.length * 100);

  document.getElementById('card-stats').innerHTML = `
    <div class="stat-card"><div class="stat-label">Know it ✓</div><div class="stat-val" style="color:var(--green);">${know}</div></div>
    <div class="stat-card"><div class="stat-label">Almost ~</div><div class="stat-val" style="color:var(--amber);">${almost}</div></div>
    <div class="stat-card"><div class="stat-label">Need work ✗</div><div class="stat-val" style="color:var(--red);">${no}</div></div>
    <div class="stat-card"><div class="stat-label">Score</div><div class="stat-val" style="color:var(--accent);">${pct}%</div></div>`;
}

function showDone() {
  const scores = getScores();
  const know = deck.filter(c => scores[c.id] === 'know').length;
  document.getElementById('done-screen').style.display = 'block';
  document.getElementById('done-stats').textContent = `You knew ${know} of ${deck.length} cards. ${know === deck.length ? 'Perfect! 🎯' : 'Review the red ones again.'}`;
}

function restart() {
  current = 0; flipped = false;
  document.getElementById('flashcard').classList.remove('flipped');
  document.getElementById('grade-row').style.display = 'none';
  document.getElementById('done-screen').style.display = 'none';
  renderCard(); renderDots();
}

function resetScores() {
  S.del(KEYS.cards); renderStats(); renderDots(); toast('Scores reset.');
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') next();
  if (e.key === 'ArrowLeft') prev();
  if (e.key === ' ') { e.preventDefault(); flip(); }
  if (e.key === '1') grade('no');
  if (e.key === '2') grade('almost');
  if (e.key === '3') grade('know');
});

function submitCustomCard() {
  const topic = document.getElementById('new-fc-topic').value.trim() || 'General';
  const q = document.getElementById('new-fc-q').value.trim();
  const a = document.getElementById('new-fc-a').value.trim();
  if (!q || !a) { toast('Question and answer are required.', 'warning'); return; }
  addCustomCard(topic, q, a);
  document.getElementById('new-fc-q').value = '';
  document.getElementById('new-fc-a').value = '';
  document.getElementById('new-fc-topic').value = '';
  renderCustomList();
  toast('Flashcard added!', 'success');
}

function removeCustomFC(id) {
  deleteCustomCard(id);
  renderCustomList();
  toast('Card removed.');
}

function renderCustomList() {
  const cards = getCustomCards();
  const el = document.getElementById('custom-cards-list');
  if (!cards.length) { el.innerHTML = ''; return; }
  el.innerHTML = '<div class="section-title">Your custom flashcards (' + cards.length + ')</div>' +
    cards.map(c => `
      <div class="entry-card">
        <div class="entry-head">
          <div style="display:flex;gap:6px;align-items:center;">
            <span class="badge badge-purple">${c.topic}</span>
            <span class="badge badge-gray">Custom</span>
          </div>
          <button class="btn btn-danger btn-sm" data-card-id="${c.id}" onclick="removeCustomFC(this.dataset.cardId)">Delete</button>
        </div>
        <div class="entry-topic">${c.q}</div>
        <div class="entry-body">${c.a}</div>
      </div>`).join('');
}

renderCustomList();

filterCards();
</script>
</body>
</html>
