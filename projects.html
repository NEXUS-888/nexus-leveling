<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NEXUS leveling — Projects</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<nav>
  <div class="nav-brand">⚡ <span>NEXUS</span>leveling</div>
  <button class="hamburger" onclick="document.querySelector('.nav-links').classList.toggle('open')" aria-label="Menu">☰</button>
  <div class="nav-links">
    <a href="index.html">Dashboard</a>
    <a href="log.html">Daily Log</a>
    <a href="roadmap.html">Roadmap</a>
    <a href="resources.html">Resources</a>
    <a href="flashcards.html">Flashcards</a>
    <a href="projects.html" class="active">Projects</a>
    <a href="jobs.html">Jobs</a>
    <a href="cheatsheet.html">Cheatsheet</a>
  </div>
  <div class="nav-right"><div class="streak-pill" id="streak-pill">🔥 0d streak</div></div>
</nav>

<div class="page">
  <div class="page-header animate-in">
    <h1>Projects</h1>
    <p>Track what you've actually built. Watching tutorials ≠ building. Ship real things.</p>
  </div>

  <div class="stats-grid animate-in delay-1" id="project-stats" style="margin-bottom:1.5rem;"></div>

  <!-- ADD PROJECT FORM -->
  <div class="card animate-in delay-2" style="margin-bottom:1.5rem;">
    <div class="section-title" style="margin-top:0;">Add a project</div>
    <div class="form-row">
      <div>
        <label>Project name *</label>
        <input type="text" id="proj-name" placeholder="e.g. Flask S3 Image Uploader">
      </div>
      <div>
        <label>Phase / Week</label>
        <select id="proj-phase"></select>
      </div>
    </div>
    <div class="form-group">
      <label>Description *</label>
      <textarea id="proj-desc" placeholder="What does this project do? What problem does it solve?"></textarea>
    </div>
    <div class="form-row">
      <div>
        <label>Tech stack (comma separated)</label>
        <input type="text" id="proj-tech" placeholder="Docker, AWS EC2, Python, Terraform...">
      </div>
      <div>
        <label>GitHub URL</label>
        <input type="url" id="proj-github" placeholder="https://github.com/...">
      </div>
    </div>
    <div class="form-row">
      <div>
        <label>Live URL (if deployed)</label>
        <input type="url" id="proj-live" placeholder="https://...">
      </div>
      <div>
        <label>Status</label>
        <select id="proj-status">
          <option value="planning">📋 Planning</option>
          <option value="in-progress" selected>🔨 In Progress</option>
          <option value="deployed">🚀 Deployed</option>
          <option value="abandoned">💀 Abandoned</option>
        </select>
      </div>
    </div>
    <button class="btn btn-primary" onclick="submitProject()">+ Add project</button>
  </div>

  <!-- FILTER -->
  <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;align-items:center;">
    <select id="filter-status" onchange="debouncedRender()" style="font-size:13px;padding:7px 10px;">
      <option value="">All statuses</option>
      <option value="planning">📋 Planning</option>
      <option value="in-progress">🔨 In Progress</option>
      <option value="deployed">🚀 Deployed</option>
      <option value="abandoned">💀 Abandoned</option>
    </select>
    <input type="text" id="search" oninput="render()" placeholder="Search projects..." style="font-size:13px;padding:7px 10px;width:200px;">
  </div>

  <div id="projects-list"></div>
</div>

<script src="app.js"></script>
<script>
const debounced = (fn, ms) => { let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); }; };
const debouncedRender = debounced(render, 150);

const STATUS_META = {
  'planning':    { label: '📋 Planning',    cls: 'badge-gray',   color: 'var(--text2)' },
  'in-progress': { label: '🔨 In Progress', cls: 'badge-amber',  color: 'var(--amber)' },
  'deployed':    { label: '🚀 Deployed',    cls: 'badge-green',  color: 'var(--green)' },
  'abandoned':   { label: '💀 Abandoned',   cls: 'badge-red',    color: 'var(--red)' },
};

function initForm() {
  const sel = document.getElementById('proj-phase');
  ROADMAP.forEach(p => {
    const o = document.createElement('option');
    o.value = p.id; o.textContent = `${p.phase} — ${p.label}`;
    sel.appendChild(o);
  });
}

function submitProject() {
  const name = document.getElementById('proj-name').value.trim();
  const desc = document.getElementById('proj-desc').value.trim();
  if (!name || !desc) { toast('Name and description are required.', 'warning'); return; }

  const phaseId = document.getElementById('proj-phase').value;
  const phase = ROADMAP.find(p => p.id === phaseId);
  const techStr = document.getElementById('proj-tech').value.trim();
  const tech = techStr ? techStr.split(',').map(t => t.trim()).filter(Boolean) : [];

  const project = {
    id: Date.now(),
    name,
    desc,
    phase: phase ? `${phase.phase} — ${phase.label}` : phaseId,
    phaseId,
    tech,
    github: document.getElementById('proj-github').value.trim(),
    live: document.getElementById('proj-live').value.trim(),
    status: document.getElementById('proj-status').value,
    date: todayStr(),
    dateLabel: fmtDate(Date.now()),
    updatedAt: Date.now(),
  };

  addProject(project);
  ['proj-name','proj-desc','proj-tech','proj-github','proj-live'].forEach(id => document.getElementById(id).value = '');
  render();
  toast('Project added! 🚀', 'success');
}

function changeStatus(id, newStatus) {
  updateProjectStatus(id, newStatus);
  render();
}

function removeProject(id) {
  if (!confirm('Delete this project?')) return;
  deleteProject(id);
  render();
  toast('Project deleted.');
}

function renderStats() {
  const projects = getProjects();
  const total = projects.length;
  const deployed = projects.filter(p => p.status === 'deployed').length;
  const inProgress = projects.filter(p => p.status === 'in-progress').length;
  const allTech = [...new Set(projects.flatMap(p => p.tech))];

  document.getElementById('project-stats').innerHTML = `
    <div class="stat-card"><div class="stat-label">Total projects</div><div class="stat-val">${total}</div><div class="stat-sub">Keep building</div></div>
    <div class="stat-card"><div class="stat-label">Deployed</div><div class="stat-val" style="color:var(--green);">${deployed}</div><div class="stat-sub">Live & working</div></div>
    <div class="stat-card"><div class="stat-label">In progress</div><div class="stat-val" style="color:var(--amber);">${inProgress}</div><div class="stat-sub">Finish these first</div></div>
    <div class="stat-card"><div class="stat-label">Tech used</div><div class="stat-val" style="color:var(--accent);">${allTech.length}</div><div class="stat-sub">${allTech.slice(0,3).join(', ') || 'None yet'}</div></div>
  `;
}

function render() {
  renderStats();
  let projects = getProjects();
  const statusFilter = document.getElementById('filter-status').value;
  const search = document.getElementById('search').value.toLowerCase();
  if (statusFilter) projects = projects.filter(p => p.status === statusFilter);
  if (search) projects = projects.filter(p => p.name.toLowerCase().includes(search) || p.desc.toLowerCase().includes(search));

  if (!projects.length) {
    document.getElementById('projects-list').innerHTML = '<div class="empty"><div class="empty-icon">🔨</div>No projects yet. Build something real — that\'s what gets you hired.</div>';
    return;
  }

  document.getElementById('projects-list').innerHTML = projects.map(p => {
    const st = STATUS_META[p.status] || STATUS_META['planning'];
    return `
    <div class="project-card" style="border-left: 3px solid ${st.color};">
      <div class="entry-head">
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
          <span style="font-size:15px;font-weight:600;color:var(--text);">${p.name}</span>
          <span class="badge ${st.cls}">${st.label}</span>
          <span class="badge badge-gray">${p.dateLabel}</span>
        </div>
        <button class="btn btn-danger btn-sm" onclick="removeProject(${p.id})">Delete</button>
      </div>
      <div class="entry-body" style="margin:8px 0;">${p.desc}</div>
      <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:10px;">
        <span style="font-size:12px;color:var(--text3);">${p.phase}</span>
        ${p.github ? `<a href="${p.github}" target="_blank" rel="noopener" style="font-size:12px;">GitHub ↗</a>` : ''}
        ${p.live ? `<a href="${p.live}" target="_blank" rel="noopener" style="font-size:12px;">Live demo ↗</a>` : ''}
      </div>
      ${p.tech.length ? `<div class="project-tech">${p.tech.map(t => `<span>${t}</span>`).join('')}</div>` : ''}
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:12px;">
        ${Object.entries(STATUS_META).map(([k,v]) =>
          `<button class="btn btn-sm ${p.status===k ? 'btn-primary' : ''}" onclick="changeStatus(${p.id},'${k}')">${v.label}</button>`
        ).join('')}
      </div>
    </div>`;
  }).join('');
}

initForm();
render();
</script>
</body>
</html>
